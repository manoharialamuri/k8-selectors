apiVersion: v1
kind: Pod
metadata:
  name: nginx-affinity
  labels:
    env: test
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values:
            - us-east-1c
            - us-east-1b
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 10
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:     
            - amazon 
      - weight: 1
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:     
            - roboshop      
  containers:
  - name: nginx
    image: nginx