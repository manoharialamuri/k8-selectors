apiVersion: v1
kind: Pod
metadata:
  name: pod-1
  labels:
    tier: db
spec:
  containers:
  - name: nginx
    image: nginx
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-2
  labels:
    tier: backend
spec:
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: tier
            operator: In
            values:
            - db
        topologyKey: topology.kubernetes.io/zone
  containers:
  - name: nginx
    image: nginx

